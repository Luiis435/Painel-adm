<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca Admin - Pro</title>
    <style>
        :root { --red: #E50914; --bg: #111; --card: #181818; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--red); text-align: center; margin-bottom: 25px; font-weight: 900; }
        
        label { display: block; margin-top: 15px; color: #aaa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; height: 48px; background: #252525; border: 1px solid #333; color: white; padding: 0 12px; margin-top: 5px; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--red); }

        .search-group { display: flex; gap: 8px; align-items: flex-end; }
        .btn-search { background: #333; border: 1px solid #444; color: white; height: 48px; width: 60px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; }
        .btn-search:hover { background: #444; }

        .preview-container { text-align: center; margin-top: 15px; }
        .thumb-preview { width: 120px; height: 180px; background: #222; border-radius: 6px; object-fit: cover; display: none; border: 2px solid #333; margin: 0 auto; }
        
        button#publish { width: 100%; height: 55px; background: var(--red); color: white; border: none; font-weight: bold; margin-top: 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; text-transform: uppercase; }
        button#publish:hover { background: #b20710; transform: translateY(-2px); }
        .status { margin-top: 20px; text-align: center; font-size: 0.9rem; min-height: 20px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1>CINETECA ADMIN</h1>
    
    <label>Título do Filme ou Série</label>
    <div class="search-group">
        <input type="text" id="title" placeholder="Ex: Batman">
        <button class="btn-search" onclick="searchTMDB()" title="Buscar Capa Automática">🔍</button>
    </div>

    <div class="preview-container">
        <img id="preview" class="thumb-preview">
        <input type="hidden" id="thumb"> </div>

    <label>Link do Vídeo (YouTube ou Dropbox)</label>
    <input type="text" id="url" placeholder="Cole o link original aqui...">

    <label>Gênero Principal</label>
    <input type="text" id="genre" placeholder="Ex: Ação, Comédia...">

    <div style="display: flex; gap: 12px;">
        <div style="flex: 1;">
            <label>Tipo</label>
            <select id="mediaType">
                <option value="filme">🎬 Filme</option>
                <option value="serie">📺 Série</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>Público</label>
            <select id="rating">
                <option value="adulto">Adulto</option>
                <option value="infantil">Kids</option>
            </select>
        </div>
    </div>

    <button id="publish" onclick="uploadVideo()">Publicar Agora</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
        authDomain: "cineteca-8f89c.firebaseapp.com",
        projectId: "cineteca-8f89c",
        storageBucket: "cineteca-8f89c.firebasestorage.app",
        messagingSenderId: "944562373253",
        appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // CHAVE DA API TMDB (Obtenha em themoviedb.org)
    const TMDB_KEY = '49a7a1537e0a46f1f09d04d6dc111698'; 

    // BUSCA AUTOMÁTICA DE CAPAS
    window.searchTMDB = async () => {
        const title = document.getElementById('title').value;
        const status = document.getElementById('status');
        if (!title) return alert("Digite um nome antes de buscar!");

        status.innerText = "Buscando capa...";
        
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=pt-BR&query=${title}`);
            const data = await res.json();

            if (data.results && data.results.length > 0) {
                const item = data.results[0];
                const poster = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                
                document.getElementById('thumb').value = poster;
                document.getElementById('preview').src = poster;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('mediaType').value = item.media_type === 'tv' ? 'serie' : 'filme';
                
                status.innerText = "Capa encontrada!";
                status.style.color = "#2ecc71";
            } else {
                alert("Nenhuma capa encontrada para este título.");
            }
        } catch (e) {
            alert("Erro na busca: Verifique sua chave API.");
        }
    };

    // ENVIO PARA O FIREBASE
    window.uploadVideo = async () => {
        const title = document.getElementById('title').value;
        let url = document.getElementById('url').value;
        const thumb = document.getElementById('thumb').value;
        const genre = document.getElementById('genre').value;
        const mediaType = document.getElementById('mediaType').value;
        const rating = document.getElementById('rating').value;
        const status = document.getElementById('status');

        if(!title || !url || !thumb) return alert("Preencha todos os campos e busque a capa!");

        status.innerText = "Publicando...";
        status.style.color = "white";

        // CONVERSÃO AUTOMÁTICA DROPBOX
        if (url.includes("dropbox.com")) {
            url = url.replace(/dl=0/g, "raw=1").replace(/www\.dropbox\.com/g, "dl.dropboxusercontent.com");
        }

        const videoType = (url.includes('youtube.com') || url.includes('youtu.be')) ? 'embed' : 'file';

        try {
            await addDoc(collection(db, "videos"), {
                title, url, thumb, genre, mediaType, rating, videoType,
                createdAt: serverTimestamp()
            });
            status.innerText = "✅ PUBLICADO COM SUCESSO!";
            status.style.color = "#2ecc71";
            
            // Limpar Campos
            setTimeout(() => { location.reload(); }, 2000);
        } catch (e) {
            status.innerText = "❌ Erro: " + e.message;
            status.style.color = "#e74c3c";
        }
    };
</script>

</body>
</html>
