<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM CineTeca - Gestão Pro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const TMDB_KEY = "49a7a1537e0a46f1f09d04d6dc111698";

        window.addFilme = async () => {
            const tituloDB = document.getElementById('tituloDB').value;
            const buscaCapa = document.getElementById('buscaCapa').value;
            const urlVideo = document.getElementById('urlVideo').value;
            const rating = document.getElementById('rating').value;
            const categoria = document.getElementById('categoria').value;

            if(!tituloDB || !urlVideo) {
                alert("O Título e a URL do vídeo são obrigatórios!");
                return;
            }

            document.getElementById('status').innerText = "🔍 Processando...";
            
            try {
                let capaFinal = "https://via.placeholder.com/500x750?text=Sem+Capa";
                
                // Busca no TMDB (Filme ou Série baseado na categoria)
                if(buscaCapa) {
                    const tipoBusca = categoria === "serie" ? "tv" : "movie";
                    const res = await fetch(`https://api.themoviedb.org/3/search/${tipoBusca}?api_key=${TMDB_KEY}&query=${encodeURIComponent(buscaCapa)}&language=pt-BR`);
                    const data = await res.json();
                    if(data.results && data.results.length > 0) {
                        capaFinal = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                    }
                }

                // Identifica se é link direto (MP4/Snaptube) ou Iframe
                const isDirectLink = urlVideo.includes('.mp4') || urlVideo.includes('snaptube') || urlVideo.includes('googlevideo');
                const tipoFinal = isDirectLink ? 'video/mp4' : 'iframe';

                await addDoc(collection(db, "videos"), {
                    title: tituloDB,
                    thumb: capaFinal,
                    url: urlVideo,
                    videoType: tipoFinal,
                    rating: rating,
                    category: categoria, // Nova Propriedade
                    createdAt: Date.now()
                });

                document.getElementById('status').innerText = "✅ Adicionado com sucesso!";
                // Limpar campos
                ['tituloDB', 'buscaCapa', 'urlVideo'].forEach(id => document.getElementById(id).value = "");
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "❌ Erro ao salvar.";
            }
        };

        onSnapshot(query(collection(db, "videos"), orderBy("createdAt", "desc")), (snap) => {
            const l = document.getElementById('lista');
            l.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                l.innerHTML += `
                <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <strong style="color:#E50914">[${data.category.toUpperCase()}]</strong> ${data.title}
                    </div>
                    <button onclick="apagar('${d.id}')" style="color:red; background:none; border:none; cursor:pointer; width:auto; margin:0;">Apagar</button>
                </div>`;
            });
        });

        window.apagar = async (id) => { if(confirm("Deseja realmente apagar este item?")) await deleteDoc(doc(db, "videos", id)); };
    </script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .card { background: #141414; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #E50914; letter-spacing: 2px; margin-bottom: 20px; }
        label { font-size: 0.75em; color: #888; font-weight: bold; text-transform: uppercase; display: block; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0 15px 0; border-radius: 5px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; font-size: 1em; }
        input:focus { border-color: #E50914; outline: none; }
        button { background: #E50914; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b20710; }
        #lista { margin-top: 25px; max-height: 300px; overflow-y: auto; background: #1a1a1a; border-radius: 8px; }
        .snaptube-info { font-size: 0.7em; color: #ffc107; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ADM CINETECA</h2>
        
        <label>Título de Exibição:</label>
        <input type="text" id="tituloDB" placeholder="Ex: Batman (2022)">
        
        <label>Tipo de Conteúdo:</label>
        <select id="categoria">
            <option value="filme">Filme</option>
            <option value="serie">Série / Episódio</option>
        </select>

        <label>Nome para buscar Capa (TMDB):</label>
        <input type="text" id="buscaCapa" placeholder="Ex: The Batman">
        
        <label>URL do vídeo ou Link Snaptube:</label>
        <input type="text" id="urlVideo" placeholder="Cole o link do iframe ou MP4 aqui">
        <span class="snaptube-info">* Suporta links diretos, MP4 e Iframes.</span>
        
        <label>Classificação:</label>
        <select id="rating">
            <option value="infantil">Livre / Kids</option>
            <option value="adulto">18+ / Adulto</option>
        </select>
        
        <button onclick="addFilme()">ADICIONAR AO CATÁLOGO</button>
        <p id="status" style="text-align:center; font-weight:bold;"></p>
        
        <div id="lista"></div>
    </div>
</body>
</html>
