<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca - Admin TMDB</title>
    <style>
        :root { --accent: #E50914; --bg: #141414; --tmdb-blue: #01b4e4; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .card { background: #222; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #333; }
        h1, h3 { margin-top: 0; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-search { background: var(--tmdb-blue); border: none; color: white; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #tmdb-results { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; }
        .result-item { min-width: 110px; cursor: pointer; transition: transform 0.2s; }
        .result-item:hover { transform: scale(1.05); }
        .result-item img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .result-item p { font-size: 11px; margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-add { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1rem; margin-top: 10px; }
        
        .video-item { display: flex; align-items: center; background: #1f1f1f; padding: 12px; margin-bottom: 12px; border-radius: 8px; gap: 20px; border-left: 4px solid var(--accent); }
        .video-item img { width: 50px; height: 75px; object-fit: cover; border-radius: 4px; }
        .video-info { flex: 1; }
        .btn-del { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 8px 12px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn-del:hover { background: #ff6b6b; color: white; }

        #admin-content { display: none; }
        #loading { text-align: center; padding: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">Autenticando administrador...</div>

    <div id="admin-content">
        <h1>CineTeca Admin 🎬</h1>
        
        <div class="card">
            <h3>1. Buscar no TMDB</h3>
            <div class="search-box">
                <input type="text" id="tmdb-query" placeholder="Nome do filme ou série...">
                <button type="button" class="btn-search" onclick="searchTMDB()">BUSCAR</button>
            </div>
            <div id="tmdb-results"></div>
        </div>

        <div class="card">
            <h3>2. Confirmar Detalhes</h3>
            <form id="add-form">
                <input type="text" id="title" placeholder="Título Oficial" required>
                <input type="url" id="thumb" placeholder="URL da Capa" required>
                <input type="url" id="url" placeholder="Link do Vídeo (YT, Dropbox, MP4)" required>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <select id="genre">
                        <option value="Ação">Ação</option>
                        <option value="Comédia">Comédia</option>
                        <option value="Drama">Drama</option>
                        <option value="Terror">Terror</option>
                        <option value="Ficção">Ficção</option>
                        <option value="Infantil">Infantil</option>
                        <option value="Anime">Anime</option>
                    </select>
                    <select id="mediaType">
                        <option value="filme">Filme</option>
                        <option value="serie">Série</option>
                    </select>
                    <select id="rating">
                        <option value="adulto">Público Geral</option>
                        <option value="infantil">Infantil (Kids)</option>
                    </select>
                </div>
                <button type="submit" class="btn-add">SALVAR NO FIREBASE</button>
            </form>
        </div>

        <h3>Catálogo Atual</h3>
        <div id="manage-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
        authDomain: "cineteca-8f89c.firebaseapp.com",
        projectId: "cineteca-8f89c",
        storageBucket: "cineteca-8f89c.firebasestorage.app",
        messagingSenderId: "944562373253",
        appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
    };

    const TMDB_KEY = '49a7a1537e0a46f1f09d04d6dc111698';
    const ADMIN_EMAIL = "luisff05.jua@gmail.com";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // --- AUTENTICAÇÃO ---
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadManagementList();
        } else if (user) {
            alert("Acesso negado: " + user.email);
            auth.signOut();
        } else {
            signInWithPopup(auth, provider).catch(err => console.error("Erro login:", err));
        }
    });

    // --- BUSCA TMDB ---
    window.searchTMDB = async () => {
        const query = document.getElementById('tmdb-query').value;
        const type = document.getElementById('mediaType').value; 
        const endpoint = type === 'filme' ? 'movie' : 'tv';

        if(!query) return;

        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/${endpoint}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
            const data = await res.json();
            renderResults(data.results);
        } catch (err) { alert("Erro ao buscar no TMDB"); }
    };

    function renderResults(results) {
        const div = document.getElementById('tmdb-results');
        div.innerHTML = "";
        results.slice(0, 8).forEach(item => {
            const movieDiv = document.createElement('div');
            movieDiv.className = 'result-item';
            const title = item.title || item.name; // Filmes usam 'title', Séries usam 'name'
            const poster = item.poster_path ? `https://image.tmdb.org/t/p/w342${item.poster_path}` : 'https://via.placeholder.com/342x513?text=Sem+Foto';
            
            movieDiv.innerHTML = `
                <img src="${poster}">
                <p title="${title}">${title}</p>
            `;
            movieDiv.onclick = () => {
                document.getElementById('title').value = title;
                document.getElementById('thumb').value = poster;
                document.getElementById('url').focus();
            };
            div.appendChild(movieDiv);
        });
    }

    // --- SALVAR NO FIREBASE ---
    document.getElementById('add-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.submitter;
        btn.disabled = true;
        btn.innerText = "Salvando...";

        const payload = {
            title: document.getElementById('title').value,
            thumb: document.getElementById('thumb').value,
            url: document.getElementById('url').value,
            genre: document.getElementById('genre').value,
            mediaType: document.getElementById('mediaType').value,
            rating: document.getElementById('rating').value,
            createdAt: serverTimestamp()
        };

        try {
            const col = payload.mediaType === 'filme' ? 'filmes' : 'videos';
            await addDoc(collection(db, col), payload);
            alert("Conteúdo publicado!");
            e.target.reset();
            document.getElementById('tmdb-results').innerHTML = "";
        } catch (err) { alert("Erro: " + err.message); }
        finally { btn.disabled = false; btn.innerText = "SALVAR NO FIREBASE"; }
    };

    // --- GERENCIAR LISTA ---
    function loadManagementList() {
        const listDiv = document.getElementById('manage-list');
        const cols = ['filmes', 'videos'];
        
        cols.forEach(colName => {
            const q = query(collection(db, colName), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                snap.docChanges().forEach(change => {
                    const id = change.doc.id;
                    const v = change.doc.data();
                    if(change.type === "added") {
                        const div = document.createElement('div');
                        div.id = `adm-${id}`;
                        div.className = 'video-item';
                        div.innerHTML = `
                            <img src="${v.thumb}">
                            <div class="video-info">
                                <strong>${v.title}</strong><br>
                                <small>${colName.toUpperCase()} | ${v.genre}</small>
                            </div>
                            <button class="btn-del" onclick="deleteItem('${colName}', '${id}')">Excluir</button>
                        `;
                        listDiv.prepend(div);
                    }
                    if(change.type === "removed") document.getElementById(`adm-${id}`)?.remove();
                });
            });
        });
    }

    window.deleteItem = async (col, id) => {
        if(confirm("Deseja apagar este vídeo?")) {
            await deleteDoc(doc(db, col, id));
        }
    };
</script>
</body>
</html>
