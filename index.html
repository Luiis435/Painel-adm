<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM CineTeca - Título Personalizado</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const TMDB_KEY = "49a7a1537e0a46f1f09d04d6dc111698";

        window.addFilme = async () => {
            const tituloDB = document.getElementById('tituloDB').value;
            const buscaCapa = document.getElementById('buscaCapa').value;
            const urlVideo = document.getElementById('urlVideo').value;
            const rating = document.getElementById('rating').value;

            if(!tituloDB || !urlVideo) {
                alert("O Título e a URL do vídeo são obrigatórios!");
                return;
            }

            document.getElementById('status').innerText = "🔍 Processando...";
            
            try {
                let capaFinal = "https://via.placeholder.com/500x750?text=Sem+Capa";
                
                // Só busca no TMDB se o campo de busca não estiver vazio
                if(buscaCapa) {
                    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(buscaCapa)}&language=pt-BR`);
                    const data = await res.json();
                    if(data.results && data.results.length > 0) {
                        capaFinal = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                    }
                }

                await addDoc(collection(db, "videos"), {
                    title: tituloDB,
                    thumb: capaFinal,
                    url: urlVideo,
                    videoType: 'iframe',
                    rating: rating,
                    createdAt: Date.now()
                });

                document.getElementById('status').innerText = "✅ Adicionado com sucesso!";
                document.getElementById('tituloDB').value = "";
                document.getElementById('buscaCapa').value = "";
                document.getElementById('urlVideo').value = "";
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "❌ Erro ao salvar.";
            }
        };

        onSnapshot(query(collection(db, "videos"), orderBy("createdAt", "desc")), (snap) => {
            const l = document.getElementById('lista');
            l.innerHTML = "";
            snap.forEach(d => {
                l.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center">
                    <span>${d.data().title}</span>
                    <button onclick="apagar('${d.id}')" style="color:red; background:none; border:none; cursor:pointer; width:auto;">Apagar</button>
                </div>`;
            });
        });

        window.apagar = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "videos", id)); };
    </script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; border: 1px solid #E50914; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; background: #222; color: white; border: 1px solid #333; box-sizing: border-box; }
        button { background: #E50914; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        label { font-size: 0.85em; color: #E50914; font-weight: bold; text-transform: uppercase; }
        #lista { margin-top: 20px; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ADM CINETECA</h2>
        
        <label>Título do Filme (Exibição):</label>
        <input type="text" id="tituloDB" placeholder="Como aparecerá no app">
        
        <label>Nome para buscar Capa (TMDB):</label>
        <input type="text" id="buscaCapa" placeholder="Ex: Avengers Endgame">
        
        <label>URL do vídeo:</label>
        <input type="text" id="urlVideo" placeholder="Link do iframe ou MP4">
        
        <label>Classificação:</label>
        <select id="rating">
            <option value="adulto">Adulto</option>
            <option value="infantil">Kids</option>
        </select>
        
        <button onclick="addFilme()">ADICIONAR VÍDEO</button>
        <p id="status" style="text-align:center; margin-top:10px;"></p>
        
        <div id="lista"></div>
    </div>
</body>
</html>
