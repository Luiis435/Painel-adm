<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Catálogo Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-red-600">Netflix Clone ADM</h1>
        
        <div class="bg-gray-800 p-6 rounded-lg mb-8 shadow-xl">
            <label class="block mb-2">Buscar Filme (TMDb):</label>
            <div class="flex gap-4">
                <input type="text" id="movieSearch" placeholder="Ex: Batman, Matrix..." class="flex-1 p-2 rounded bg-gray-700 border-none focus:ring-2 focus:ring-red-500 text-white">
                <button onclick="buscarFilme()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded font-bold transition">BUSCAR</button>
            </div>
        </div>

        <div id="previewArea" class="hidden bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
            <div class="flex flex-col md:flex-row gap-6">
                <img id="pPoster" src="" class="w-48 rounded shadow-lg">
                <div class="flex-1">
                    <h2 id="pTitle" class="text-2xl font-bold mb-2"></h2>
                    <p id="pGenres" class="text-red-400 text-sm mb-4 italic"></p>
                    <p id="pOverview" class="text-gray-300 text-sm mb-4"></p>
                    
                    <label class="block mb-2 text-sm font-bold">Link do Streaming (Vídeo):</label>
                    <input type="text" id="videoUrl" placeholder="https://..." class="w-full p-2 mb-4 rounded bg-gray-700 border-none">
                    
                    <button onclick="salvarNoFirebase()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded font-bold">ADICIONAR AO CATÁLOGO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES (SUBSTITUA PELAS SUAS)
        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "ID",
            appId: "ID"
        };
        const TMDB_KEY = '49a7a1537e0a46f1f09d04d6dc111698';

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tempMovieData = {}; // Guarda o filme buscado antes de salvar

        // Mapeamento de Gêneros do TMDb (Exemplos)
        const genreMap = {
            28: "Ação", 12: "Aventura", 16: "Animação", 35: "Comédia", 
            80: "Crime", 99: "Documentário", 18: "Drama", 27: "Terror", 
            878: "Ficção Científica", 1074: "Romance"
        };

        async function buscarFilme() {
            const query = document.getElementById('movieSearch').value;
            if(!query) return alert("Digite um nome!");

            const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURI(query)}&language=pt-BR`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const filme = data.results[0];

                if(filme) {
                    tempMovieData = {
                        titulo: filme.title,
                        sinopse: filme.overview,
                        poster: `https://image.tmdb.org/t/p/w500${filme.poster_path}`,
                        categorias: filme.genre_ids.map(id => genreMap[id] || "Outros"),
                        ano: new Date(filme.release_date).getFullYear(),
                        nota: filme.vote_average
                    };

                    // Preencher UI
                    document.getElementById('pTitle').innerText = tempMovieData.titulo;
                    document.getElementById('pPoster').src = tempMovieData.poster;
                    document.getElementById('pGenres').innerText = tempMovieData.categorias.join(" • ");
                    document.getElementById('pOverview').innerText = tempMovieData.sinopse;
                    document.getElementById('previewArea').classList.remove('hidden');
                } else {
                    alert("Nenhum filme encontrado.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function salvarNoFirebase() {
            const videoUrl = document.getElementById('videoUrl').value;
            if(!videoUrl) return alert("Insira o link do vídeo!");

            try {
                await db.collection("filmes").add({
                    ...tempMovieData,
                    urlStream: videoUrl,
                    dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Sucesso! Filme já está nas categorias.");
                location.reload();
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        }
    </script>
</body>
</html>
