<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - CineTeca</title>
    <style>
        body { background: #111; color: white; font-family: 'Inter', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 500px; background: #181818; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #E50914; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; color: #aaa; font-size: 0.85rem; font-weight: bold; }
        input, select { width: 100%; height: 45px; background: #252525; border: 1px solid #333; color: white; padding: 0 12px; margin-top: 5px; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #E50914; }
        
        .upload-area { margin-top: 20px; padding: 20px; border: 2px dashed #444; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #E50914; background: #1f1f1f; }
        
        button { width: 100%; height: 50px; background: #E50914; color: white; border: none; font-weight: bold; margin-top: 25px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #b20710; }
        .status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1>CineTeca Admin</h1>
    
    <label>Título do Conteúdo</label>
    <input type="text" id="title" placeholder="Ex: Inception (2010)">

    <label>URL do Vídeo (YouTube, Dropbox ou MP4)</label>
    <input type="text" id="url" placeholder="Cole o link aqui...">

    <label>Link da Capa (Thumbnail)</label>
    <input type="text" id="thumb" placeholder="https://image.tmdb.org/t/p/w500/...">

    <label>Gênero</label>
    <input type="text" id="genre" placeholder="Ex: Ficção Científica">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Tipo</label>
            <select id="mediaType">
                <option value="filme">Filme</option>
                <option value="serie">Série</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>Público</label>
            <select id="rating">
                <option value="adulto">Adulto</option>
                <option value="infantil">Infantil</option>
            </select>
        </div>
    </div>

    <button onclick="uploadVideo()">PUBLICAR NO APP</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
        authDomain: "cineteca-8f89c.firebaseapp.com",
        projectId: "cineteca-8f89c",
        storageBucket: "cineteca-8f89c.firebasestorage.app",
        messagingSenderId: "944562373253",
        appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.uploadVideo = async () => {
        const title = document.getElementById('title').value;
        let url = document.getElementById('url').value;
        const thumb = document.getElementById('thumb').value;
        const genre = document.getElementById('genre').value;
        const mediaType = document.getElementById('mediaType').value;
        const rating = document.getElementById('rating').value;
        const status = document.getElementById('status');

        if(!title || !url || !thumb) return alert("Por favor, preencha Título, URL e Capa!");

        status.innerText = "Processando link...";
        status.style.color = "white";

        // Lógica de Conversão Automática Dropbox
        if (url.includes("dropbox.com")) {
            url = url.replace(/\?dl=0/g, "?raw=1");
            url = url.replace(/www\.dropbox\.com/g, "dl.dropboxusercontent.com");
        }

        // Detectar se é YouTube ou Arquivo Direto
        let videoType = 'file';
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
            videoType = 'embed';
        }

        try {
            await addDoc(collection(db, "videos"), {
                title,
                url,
                thumb,
                genre,
                mediaType,
                rating,
                videoType: videoType,
                createdAt: serverTimestamp()
            });
            
            status.style.color = "#2ecc71";
            status.innerText = "Sucesso! Conteúdo disponível no app.";
            document.querySelectorAll('input').forEach(i => i.value = "");
        } catch (e) {
            status.style.color = "#e74c3c";
            status.innerText = "Erro ao salvar: " + e.message;
        }
    }
</script>

</body>
</html>
