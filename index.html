<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca - Admin Master</title>
    <style>
        :root { --accent: #E50914; --bg: #111; --tmdb-blue: #01b4e4; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Telas */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #admin-content { display: none; padding-top: 20px; }

        /* Estilização de Cards */
        .card { background: #1f1f1f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        h1, h2, h3 { margin-bottom: 15px; }

        /* Inputs e Botões */
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-google { background: white; color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 1rem; }
        .btn-search { background: var(--tmdb-blue); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); border: none; color: white; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        /* TMDB Results */
        #tmdb-results { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .tmdb-item { min-width: 100px; cursor: pointer; transition: 0.3s; }
        .tmdb-item:hover { transform: scale(1.08); }
        .tmdb-item img { width: 100%; border-radius: 6px; }
        .tmdb-item p { font-size: 10px; text-align: center; margin-top: 5px; }

        /* Lista de Itens */
        .list-item { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; gap: 15px; border-left: 4px solid var(--accent); }
        .list-item img { width: 45px; height: 65px; object-fit: cover; border-radius: 4px; }
        .list-info { flex: 1; }
        .btn-del { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .btn-del:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h1 style="color: var(--accent); font-weight: 900;">CINETECA ADMIN</h1>
        <p id="auth-msg">Acesse para gerenciar o catálogo</p>
        <button class="btn-google" id="login-trigger">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Entrar com Google
        </button>
    </div>

    <div id="admin-content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Painel de Controle</h2>
            <button onclick="location.reload()" style="background: none; border: 1px solid #666; color: #aaa; cursor: pointer; padding: 5px 10px; border-radius: 4px;">Sair</button>
        </header>

        <div class="card">
            <h3>1. Pesquisar no TMDB</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="tmdb-query" placeholder="Ex: Vingadores, Breaking Bad...">
                <button class="btn-search" id="tmdb-btn">BUSCAR</button>
            </div>
            <div id="tmdb-results"></div>
        </div>

        <div class="card">
            <h3>2. Confirmar Dados</h3>
            <form id="content-form">
                <input type="text" id="f-title" placeholder="Título" required>
                <input type="text" id="f-thumb" placeholder="URL da Capa" required>
                <input type="text" id="f-url" placeholder="URL do Vídeo (YouTube, Dropbox, MP4)" required>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <select id="f-genre">
                        <option value="Ação">Ação</option>
                        <option value="Comédia">Comédia</option>
                        <option value="Terror">Terror</option>
                        <option value="Drama">Drama</option>
                        <option value="Ficção">Ficção</option>
                        <option value="Anime">Anime</option>
                        <option value="Infantil">Infantil</option>
                    </select>
                    <select id="f-type">
                        <option value="filme">Filme</option>
                        <option value="serie">Série</option>
                    </select>
                    <select id="f-rating">
                        <option value="adulto">Geral</option>
                        <option value="infantil">Infantil</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">PUBLICAR NO APP</button>
            </form>
        </div>

        <h3>Catálogo Ativo</h3>
        <div id="catalog-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
        authDomain: "cineteca-8f89c.firebaseapp.com",
        projectId: "cineteca-8f89c",
        storageBucket: "cineteca-8f89c.firebasestorage.app",
        messagingSenderId: "944562373253",
        appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
    };

    const TMDB_KEY = '49a7a1537e0a46f1f09d04d6dc111698';
    const ADMIN_EMAIL = "luisff05.jua@gmail.com";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ELEMENTOS
    const authScreen = document.getElementById('auth-screen');
    const adminContent = document.getElementById('admin-content');
    const loginBtn = document.getElementById('login-trigger');
    const authMsg = document.getElementById('auth-msg');

    // --- AUTENTICAÇÃO ---
    loginBtn.onclick = () => {
        signInWithPopup(auth, provider).catch(e => alert("Erro: " + e.message));
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === ADMIN_EMAIL) {
                authScreen.style.display = 'none';
                adminContent.style.display = 'block';
                loadCatalog();
            } else {
                authMsg.innerText = "Acesso Negado: " + user.email;
                authMsg.style.color = "red";
                auth.signOut();
            }
        } else {
            authScreen.style.display = 'flex';
            adminContent.style.display = 'none';
        }
    });

    // --- BUSCA TMDB ---
    document.getElementById('tmdb-btn').onclick = async () => {
        const query = document.getElementById('tmdb-query').value;
        const type = document.getElementById('f-type').value === 'filme' ? 'movie' : 'tv';
        if(!query) return;

        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
            const data = await res.json();
            const resultsDiv = document.getElementById('tmdb-results');
            resultsDiv.innerHTML = "";

            data.results.slice(0, 6).forEach(item => {
                const title = item.title || item.name;
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w342${item.poster_path}` : 'https://via.placeholder.com/342x513';
                
                const div = document.createElement('div');
                div.className = 'tmdb-item';
                div.innerHTML = `<img src="${poster}"><p>${title}</p>`;
                div.onclick = () => {
                    document.getElementById('f-title').value = title;
                    document.getElementById('f-thumb').value = poster;
                    document.getElementById('f-url').focus();
                };
                resultsDiv.appendChild(div);
            });
        } catch (e) { alert("Erro ao buscar no TMDB"); }
    };

    // --- SALVAR NO FIREBASE ---
    document.getElementById('content-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.innerText = "Publicando...";

        const data = {
            title: document.getElementById('f-title').value,
            thumb: document.getElementById('f-thumb').value,
            url: document.getElementById('f-url').value,
            genre: document.getElementById('f-genre').value,
            mediaType: document.getElementById('f-type').value,
            rating: document.getElementById('f-rating').value,
            createdAt: serverTimestamp()
        };

        try {
            const col = data.mediaType === 'filme' ? 'filmes' : 'videos';
            await addDoc(collection(db, col), data);
            alert("Sucesso!");
            e.target.reset();
            document.getElementById('tmdb-results').innerHTML = "";
        } catch (err) { alert("Erro ao salvar"); }
        finally { btn.disabled = false; btn.innerText = "PUBLICAR NO APP"; }
    };

    // --- LISTAR CATALOGO ---
    function loadCatalog() {
        const listDiv = document.getElementById('catalog-list');
        listDiv.innerHTML = "";
        const collections = ['filmes', 'videos'];

        collections.forEach(colName => {
            const q = query(collection(db, colName), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                snap.docChanges().forEach(change => {
                    const id = change.doc.id;
                    const v = change.doc.data();
                    if(change.type === "added") {
                        const item = document.createElement('div');
                        item.id = `item-${id}`;
                        item.className = 'list-item';
                        item.innerHTML = `
                            <img src="${v.thumb}">
                            <div class="list-info">
                                <strong>${v.title}</strong><br>
                                <small>${colName.toUpperCase()} | ${v.genre}</small>
                            </div>
                            <button class="btn-del" onclick="deleteItem('${colName}', '${id}')">Excluir</button>
                        `;
                        listDiv.prepend(item);
                    }
                    if(change.type === "removed") document.getElementById(`item-${id}`)?.remove();
                });
            });
        });
    }

    window.deleteItem = async (col, id) => {
        if(confirm("Excluir permanentemente?")) {
            await deleteDoc(doc(db, col, id));
        }
    };
</script>

</body>
</html>
