<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca - Admin Master Ultra</title>
    <style>
        :root { --accent: #E50914; --bg: #111; --tmdb-blue: #01b4e4; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #admin-content { display: none; padding-top: 20px; }

        .card { background: #1f1f1f; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        h1, h2, h3 { margin-bottom: 15px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 80px; resize: none; }
        
        /* Destaque para o campo que você precisa preencher */
        #f-url { border: 2px solid var(--tmdb-blue); background: #1a262e; }

        .btn-adm { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 200px; }
        .btn-search { background: var(--tmdb-blue); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); border: none; color: white; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        #tmdb-results { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; min-height: 150px; }
        .tmdb-item { min-width: 110px; cursor: pointer; transition: 0.3s; }
        .tmdb-item:hover { transform: scale(1.05); }
        .tmdb-item img { width: 100%; border-radius: 6px; border: 2px solid transparent; }
        .tmdb-item:hover img { border-color: var(--tmdb-blue); }
        .tmdb-item p { font-size: 11px; text-align: center; margin-top: 5px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .list-item { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; gap: 15px; border-left: 4px solid var(--accent); }
        .list-item img { width: 45px; height: 65px; object-fit: cover; border-radius: 4px; }
        .list-info { flex: 1; }
        .btn-del { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h1 style="color: var(--accent); font-weight: 900;">CINETECA ADMIN</h1>
        <div style="max-width: 300px; width: 90%;">
            <input type="password" id="admin-pass" placeholder="Senha mestre">
            <button class="btn-adm" onclick="verifyPass()">ACESSAR</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="card">
            <h3>1. Buscar Filme ou Série</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="tmdb-query" placeholder="Digite o nome...">
                <button class="btn-search" id="tmdb-btn">BUSCAR</button>
            </div>
            <div id="tmdb-results"></div>
        </div>

        <div class="card">
            <h3>2. Informações Automáticas</h3>
            <form id="content-form">
                <input type="text" id="f-title" placeholder="Título (Auto)" required>
                <input type="text" id="f-thumb" placeholder="URL da Capa (Auto)" required>
                
                <p style="color: var(--tmdb-blue); font-size: 12px; margin: 0;">↓ Cole o link abaixo (Dropbox converte sozinho)</p>
                <input type="text" id="f-url" placeholder="COLE A URL DO VÍDEO AQUI" required>
                
                <textarea id="f-desc" placeholder="Sinopse (Auto)"></textarea>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <select id="f-genre">
                        <option value="Ação">Ação</option>
                        <option value="Comédia">Comédia</option>
                        <option value="Terror">Terror</option>
                        <option value="Drama">Drama</option>
                        <option value="Ficção">Ficção</option>
                        <option value="Anime">Anime</option>
                        <option value="Infantil">Infantil</option>
                        <option value="Aventura">Aventura</option>
                        <option value="Suspense">Suspense</option>
                    </select>
                    <select id="f-type">
                        <option value="filme">Filme</option>
                        <option value="serie">Série</option>
                    </select>
                    <select id="f-rating">
                        <option value="adulto">Geral</option>
                        <option value="infantil">Infantil</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">PUBLICAR AGORA</button>
            </form>
        </div>

        <h3>Catálogo</h3>
        <div id="catalog-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
        authDomain: "cineteca-8f89c.firebaseapp.com",
        projectId: "cineteca-8f89c",
        storageBucket: "cineteca-8f89c.firebasestorage.app",
        messagingSenderId: "944562373253",
        appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
    };

    const TMDB_KEY = '49a7a1537e0a46f1f09d04d6dc111698';
    const MASTER_PASS = "Luisadm";

    const GENRE_MAP = {
        28: "Ação", 12: "Aventura", 16: "Anime", 35: "Comédia", 80: "Ação", 
        18: "Drama", 10751: "Infantil", 14: "Ficção", 27: "Terror", 
        878: "Ficção", 53: "Suspense", 10759: "Ação", 10765: "Ficção"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.verifyPass = () => {
        if(document.getElementById('admin-pass').value === MASTER_PASS) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadCatalog();
        }
    };

    document.getElementById('tmdb-btn').onclick = async () => {
        const queryVal = document.getElementById('tmdb-query').value;
        const type = document.getElementById('f-type').value === 'filme' ? 'movie' : 'tv';
        if(!queryVal) return;

        const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(queryVal)}&language=pt-BR`);
        const data = await res.json();
        const resultsDiv = document.getElementById('tmdb-results');
        resultsDiv.innerHTML = "";

        data.results.slice(0, 6).forEach(item => {
            const title = item.title || item.name;
            const poster = `https://image.tmdb.org/t/p/w342${item.poster_path}`;
            const gName = GENRE_MAP[item.genre_ids[0]] || "Ação";

            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p>${title}</p>`;
            div.onclick = () => {
                document.getElementById('f-title').value = title;
                document.getElementById('f-thumb').value = poster;
                document.getElementById('f-desc').value = item.overview;
                document.getElementById('f-genre').value = gName;
                
                // FOCO AUTOMÁTICO NO LINK
                const urlInput = document.getElementById('f-url');
                urlInput.focus();
                urlInput.scrollIntoView({behavior: "smooth"});
            };
            resultsDiv.appendChild(div);
        });
    };

    document.getElementById('content-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;

        let videoUrl = document.getElementById('f-url').value;
        
        // AUTO CONVERSÃO DROPBOX
        if(videoUrl.includes("dropbox.com")) {
            videoUrl = videoUrl.replace("dl=0", "raw=1").replace("www.dropbox.com", "dl.dropboxusercontent.com");
        }

        const data = {
            title: document.getElementById('f-title').value,
            thumb: document.getElementById('f-thumb').value,
            url: videoUrl,
            desc: document.getElementById('f-desc').value,
            genre: document.getElementById('f-genre').value,
            mediaType: document.getElementById('f-type').value,
            rating: document.getElementById('f-rating').value,
            createdAt: serverTimestamp()
        };

        try {
            await addDoc(collection(db, data.mediaType === 'filme' ? 'filmes' : 'videos'), data);
            alert("Publicado!");
            e.target.reset();
            document.getElementById('tmdb-results').innerHTML = "";
        } catch (err) { alert(err.message); }
        finally { btn.disabled = false; }
    };

    function loadCatalog() {
        const listDiv = document.getElementById('catalog-list');
        ['filmes', 'videos'].forEach(col => {
            onSnapshot(query(collection(db, col), orderBy("createdAt", "desc")), (snap) => {
                snap.docChanges().forEach(change => {
                    const id = change.doc.id;
                    const v = change.doc.data();
                    if(change.type === "added") {
                        const div = document.createElement('div');
                        div.id = `item-${id}`;
                        div.className = 'list-item';
                        div.innerHTML = `<img src="${v.thumb}"><div class="list-info"><strong>${v.title}</strong></div><button class="btn-del" onclick="deleteItem('${col}','${id}')">X</button>`;
                        listDiv.prepend(div);
                    }
                    if(change.type === "removed") document.getElementById(`item-${id}`)?.remove();
                });
            });
        });
    }

    window.deleteItem = async (c, i) => { if(confirm("Apagar?")) await deleteDoc(doc(db, c, i)); };
</script>
</body>
</html>
